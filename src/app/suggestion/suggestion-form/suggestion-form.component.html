<div class="form-card">

  <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()">

    <!-- TITLE -->
    <label>Titre</label>
    <input formControlName="title">

    <div class="error" *ngIf="title?.touched && title?.invalid">
      <div *ngIf="title?.errors?.['required']">Le titre est obligatoire.</div>
      <div *ngIf="title?.errors?.['minlength']">Minimum 5 caractères.</div>
      <div *ngIf="title?.errors?.['pattern']">
        Doit commencer par une majuscule et contenir uniquement des lettres.
      </div>
    </div>

    <!-- DESCRIPTION -->
    <label>Description</label>
    <textarea formControlName="description"></textarea>

    <div class="error" *ngIf="description?.touched && description?.invalid">
      <div *ngIf="description?.errors?.['required']">La description est obligatoire.</div>
      <div *ngIf="description?.errors?.['minlength']">
        Minimum 30 caractères.
      </div>
    </div>

    <!-- CATEGORY -->
    <label>Catégorie</label>
    <select formControlName="category">
      <option value="">-- Sélectionnez --</option>
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>

    <div class="error" *ngIf="category?.touched && category?.invalid">
      La catégorie est obligatoire.
    </div>

    <!-- DATE -->
    <label>Date</label>
    <input formControlName="date" readonly>

    <!-- STATUS -->
    <label>Status</label>
    <input formControlName="status" readonly>

    <!-- SUBMIT -->
    <button type="submit" [disabled]="suggestionForm.invalid">
      Soumettre
    </button>

  </form>

</div>
